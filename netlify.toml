[build]
  command = "npx @11ty/eleventy"
  publish = "_site"

# Identity & CMS routes — must come BEFORE catch-all
[[redirects]]
  from = "/.netlify/identity/*"
  to = "/.netlify/identity/:splat"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

# Catch-all SPA redirect for everything else
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
