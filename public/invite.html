<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accept Invitation - Caelis Galeria</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 { color: #333; margin-bottom: 1rem; }
    p { color: #666; margin-bottom: 2rem; }
    .loading { color: #999; }
    .error { color: #e74c3c; }
    .success { color: #27ae60; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Caelis Galeria</h1>
    <p id="message" class="loading">Processing your invitation...</p>
  </div>

  <script>
    // Initialize Netlify Identity
    netlifyIdentity.init();

    // Get the invite token from URL hash
    const hash = window.location.hash;
    const messageEl = document.getElementById('message');

    if (hash.includes('invite_token=')) {
      const token = hash.split('invite_token=')[1];
      
      // Accept the invitation
      netlifyIdentity.acceptInvite(token)
        .then(() => {
          messageEl.textContent = 'Invitation accepted! Redirecting to admin...';
          messageEl.className = 'success';
          setTimeout(() => {
            window.location.href = '/admin';
          }, 2000);
        })
        .catch((err) => {
          messageEl.textContent = 'Error: ' + err.message;
          messageEl.className = 'error';
          console.error('Invite error:', err);
        });
    } else if (hash.includes('recovery_token=')) {
      const token = hash.split('recovery_token=')[1];
      
      // Handle password recovery
      netlifyIdentity.recover(token)
        .then(() => {
          messageEl.textContent = 'Password reset successful! Redirecting to admin...';
          messageEl.className = 'success';
          setTimeout(() => {
            window.location.href = '/admin';
          }, 2000);
        })
        .catch((err) => {
          messageEl.textContent = 'Error: ' + err.message;
          messageEl.className = 'error';
          console.error('Recovery error:', err);
        });
    } else {
      messageEl.textContent = 'No invitation token found. Please use the link from your email.';
      messageEl.className = 'error';
    }
  </script>
</body>
</html>
